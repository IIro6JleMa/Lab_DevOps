apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello
  namespace: devops-lab
spec:
  ingressClassName: traefik
  rules:
    - host: hello.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
